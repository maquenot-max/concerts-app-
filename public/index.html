<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PP Comm</title>
<link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;
  --surface:#ffffff;
  --border:#ebebeb;
  --border-light:#f2f2f2;
  --text:#111111;
  --text-2:#666666;
  --text-3:#aaaaaa;
  --accent:#111111;
  --red:#d94f3d;
  --red-bg:#fdf2f1;
  --red-border:#f5c6c2;
  --green:#2d7a4f;
  --green-bg:#eef7f2;
  --amber:#888888;
  --amber-bg:#f5f5f3;
  --amber-border:#e0e0e0;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── HEADER FIXE ──────────────────────────────────────── */
header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  height:52px;padding:0 2rem;
  display:flex;align-items:center;gap:1.5rem;
}
header h1{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--text);flex:1}
.nav{display:flex;gap:1px;background:var(--bg);border-radius:8px;padding:3px}
.nav button{
  padding:5px 14px;font-size:13px;border:none;background:transparent;
  cursor:pointer;color:var(--text-2);border-radius:6px;font-weight:500;
  transition:all .15s;
}
.nav button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.nav button:hover:not(.active){color:var(--text);background:rgba(0,0,0,.04)}

/* ── MAIN ─────────────────────────────────────────────── */
main{padding:72px 2rem 2rem;max-width:1600px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* ── STATS ────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow)}
.stat-n{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat-n.red{color:var(--red)}
.stat-l{font-size:11px;color:var(--text-3);margin-top:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}

/* ── FILTERS ──────────────────────────────────────────── */
.filters{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.filters input,.filters select{
  padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;background:var(--surface);color:var(--text);
  box-shadow:var(--shadow);outline:none;transition:border-color .15s;
}
.filters input{width:200px}
.filters input:focus,.filters select:focus{border-color:#aaa}

/* ── GRID KANBAN ──────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.col{cursor:pointer;min-width:0;border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.col:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.col-head{
  padding:10px 12px;border-radius:var(--radius) var(--radius) 0 0;
  border:1px solid var(--border);border-bottom:1px solid var(--border-light);background:#fafaf8;
}
.col-head.late{background:#fafaf8;border-color:var(--border);border-bottom-color:var(--border-light)}
.col-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.col-name.late{color:var(--text)}
.col-sub{font-size:11px;color:var(--text-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.col-sub.late{color:var(--text-2)}
.pbar{height:2px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:var(--text)}
.col-head.late .pfill{background:var(--text)}
.pbar-meta{display:flex;justify-content:space-between;margin-top:4px}
.pbar-meta span{font-size:10px;color:var(--text-3)}
.pbar-meta span.red{color:var(--red);font-weight:600}
.col-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:var(--surface);overflow:hidden}
.col-head.late+.col-body{border-color:var(--border)}
.titem{padding:7px 12px;border-bottom:1px solid var(--border-light);display:flex;align-items:flex-start;gap:6px;cursor:pointer}
.titem:last-child{border-bottom:none}
.titem:hover{background:var(--bg)}
.chk{width:12px;height:12px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}
.chk.on{background:var(--text);border-color:var(--text)}
.tname{font-size:11px;line-height:1.4;color:var(--text)}
.tlate{font-size:10px;color:var(--red);margin-top:1px;font-weight:500}
.ok-col{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px 12px;background:var(--surface)}
.ok-badge{font-size:10px;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:20px;font-weight:500}

/* ── PILLS ────────────────────────────────────────────── */
.pill{font-size:9px;padding:1px 6px;border-radius:20px;font-weight:500;display:inline-block;margin-top:2px}
.p-gen {background:#f0f0ee;color:#555555}
.p-col {background:#eef5ff;color:#4a6fa5}
.p-affp{background:#fff4ed;color:#a0622a}
.p-sp  {background:#f3eeff;color:#7048a8}
.p-press{background:#edfaf3;color:#2a7a52}
.p-jx  {background:#fff0f0;color:#a84848}
.p-rs  {background:#fef5e7;color:#a07030}
.p-web {background:#e8f8ff;color:#2a7090}
.p-bud {background:#f0fff4;color:#2d7a4f}
.p-ph  {background:#fdf0ff;color:#8a3a9a}
.p-prod{background:#fff8e8;color:#a06820}
.p-aff {background:#fff4ed;color:#a0622a}
.p-pr  {background:#fdf0ff;color:#8a3a9a}

/* ── CARD ─────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card h2{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group label{font-size:12px;color:var(--text-2);display:block;margin-bottom:4px;font-weight:500}
.form-group input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);transition:border-color .15s;outline:none}
.form-group input:focus{border-color:#888}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg);border-color:#ccc}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333;border-color:#333}
.btn-danger{border-color:var(--red-border);color:var(--red);background:var(--surface)}
.btn-danger:hover{background:var(--red-bg)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.dbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:3px 7px;border-radius:var(--radius-sm)}
.dbtn:hover{color:var(--red);background:var(--red-bg)}
.reset-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text-3);font-weight:500;transition:all .15s;flex:1}
.reset-btn:hover{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}

/* ── CONCERTS LIST ────────────────────────────────────── */
.crow{display:flex;align-items:stretch;gap:0;padding:0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:52px}
.crow:last-child{border-bottom:none}
.crow:hover{background:#fafaf8}
.crow-name{font-size:13px;font-weight:600;letter-spacing:-.01em}
.crow-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.crow-late{font-size:10px;color:var(--red);background:var(--red-bg);padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid var(--red-border)}
.crow-ok{font-size:10px;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.crow-announced{font-size:10px;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.ann-undo{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:13px;padding:2px 5px;border-radius:4px;flex-shrink:0}
.ann-undo:hover{color:var(--text);background:var(--bg)}

/* ── PROCESS ──────────────────────────────────────────── */
.prow{display:grid;grid-template-columns:16px 1fr 58px 110px 110px 160px 28px;gap:6px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-light)}
.prow:last-child{border-bottom:none}
.prow input[type=text],.prow input[type=number]{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--surface);outline:none;transition:border-color .15s}
.prow input:focus{border-color:#888}
.prow input[type=text]{width:100%}
.prow input[type=number]{width:58px}
.prow select{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;width:100%;background:var(--surface);outline:none}
.drag{color:#ccc;cursor:grab;font-size:13px;user-select:none}
.drag:active{cursor:grabbing}
.process-header{display:grid;grid-template-columns:16px 1fr 58px 110px 110px 160px 28px;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:2px}
.process-header span{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

/* ── GROUP TITLES ─────────────────────────────────────── */
.group-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;padding:12px 0 6px;border-bottom:1px solid var(--border-light);margin-bottom:2px}
.group-title.second{margin-top:20px}

/* ── FICHE ────────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.fiche{background:var(--surface);width:500px;max-width:100vw;height:100vh;overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.1);display:flex;flex-direction:column}
.fiche-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);z-index:10}
.fiche-header h2{font-size:17px;font-weight:700;letter-spacing:-.02em;flex:1}
.fiche-close{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:18px;padding:5px;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fiche-close:hover{background:var(--bg);color:var(--text)}
.fiche-body{padding:1.5rem;flex:1}
.fiche-section{margin-bottom:1.5rem}
.fiche-section-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.fiche-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fiche-field label{font-size:12px;color:var(--text-2);display:block;margin-bottom:4px;font-weight:500}
.fiche-field input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);outline:none;transition:border-color .15s}
.fiche-field input:focus{border-color:#888}
.fiche-tasks{margin-top:8px}
.ftask{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s}
.ftask:last-child{border-bottom:none}
.ftask:hover{background:var(--bg);margin:0 -1.5rem;padding:10px 1.5rem}
.ftask.done{opacity:.35}
.ftask.done .ftask-name{text-decoration:line-through}
.ftask.blocked{opacity:.45;cursor:default}
.ftask-chk{width:16px;height:16px;border:1.5px solid #ddd;border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .15s}
.ftask-chk.on{background:var(--text);border-color:var(--text)}
.ftask-chk.blocked{border-style:dashed}
.ftask-name{font-size:13px;line-height:1.4;flex:1;font-weight:500}
.ftask-date{font-size:11px;margin-top:2px;color:var(--text-3)}
.ftask-date.late{color:var(--red);font-weight:600}
.ftask-date.soon{color:var(--text-2)}
.ftask-date.future{color:var(--text-3)}
.ftask-date.done-date{color:var(--text-3)}
.ftask-date.blocked{color:#ccc}
.status-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0;margin-top:2px}
.badge-late{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-soon{background:var(--bg);color:var(--text-2);border:1px solid var(--border)}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-blocked{background:var(--bg);color:var(--text-3)}
.fiche-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;position:sticky;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px)}
.section-sep{height:1px;background:var(--border-light);margin:1.25rem 0}

/* ── ANNONCES ─────────────────────────────────────────── */
.annonces-wrap{margin-bottom:2rem}
.ann-title{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ann-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);display:inline-block;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.ann-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ann-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:6px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;
}
.ann-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ann-card.ann-late{border-color:var(--red-border);background:var(--red-bg)}
.ann-card.ann-nodate{border:1px dashed #ddd;background:var(--bg)}
.ann-date{display:flex;align-items:baseline;gap:4px;margin-bottom:2px}
.ann-day{font-size:36px;font-weight:800;line-height:1;color:var(--text);letter-spacing:-.03em}
.ann-late .ann-day{color:var(--red)}
.ann-nodate .ann-day{color:var(--text-3);font-size:28px}
.ann-month{font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em}
.ann-late .ann-month{color:var(--red)}
.ann-nodate .ann-month{color:var(--text-3)}
.ann-art{font-size:13px;font-weight:700;line-height:1.3;color:var(--text);letter-spacing:-.01em}
.ann-ville{font-size:11px;color:var(--text-3)}
.ann-status{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;background:var(--bg);color:var(--text-3);align-self:flex-start;font-weight:500;border:1px solid var(--border)}
.ann-late .ann-status{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.ann-nodate .ann-status{background:var(--bg);color:var(--text-3)}
.ann-btn{
  background:transparent;color:var(--text-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;cursor:pointer;
  width:100%;margin-top:4px;font-weight:500;text-align:center;transition:all .15s;
}
.ann-btn:hover{background:var(--bg);color:var(--text);border-color:#bbb}
.ann-late .ann-btn{color:var(--red);border-color:var(--red-border)}
.ann-late .ann-btn:hover{background:var(--red-bg)}

/* ── MISC ─────────────────────────────────────────────── */
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;color:var(--text-3)}
.loading-full p{font-size:13px;font-weight:500}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.saving{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;z-index:200;box-shadow:var(--shadow-md)}
.saving.show{opacity:1}
.empty-state{color:var(--text-3);font-size:13px;padding:3rem 0;text-align:center}
.ttoday{font-size:10px;color:var(--text-2);margin-top:1px;font-weight:500}
.titem.highlighted{background:rgba(201,162,39,.1);border-left:3px solid rgba(201,162,39,.65);padding-left:9px}

/* ── CELLULES INLINE EDITABLES ───────────────────────── */
.crow-cell{min-width:110px;max-width:170px;padding:4px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s;flex-shrink:0;display:flex;flex-direction:column}
.crow-cell:hover{background:var(--bg);border-color:var(--border)}
.crow-cell.has-value{background:var(--bg)}
.crow-cell.editing{background:var(--surface);border-color:#888;box-shadow:0 0 0 2px rgba(0,0,0,.06)}
.crow-cell-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:2px}
.crow-cell-value{font-size:11px;color:var(--text-2);line-height:1.3;word-break:break-word}
.crow-cell-empty{font-size:11px;color:#ccc;font-style:italic}
.crow-cell-link{font-size:11px;color:#4a6fa5;text-decoration:none}
.crow-cell-budget{width:140px !important}
.crow-cell-link:hover{text-decoration:underline}
.crow-cell input{width:100%;border:none;outline:none;background:transparent;font-size:11px;color:var(--text);font-family:inherit;padding:0}

/* ── CONCERTS NON ANNONCES ───────────────────────────── */
.crow.not-announced{background:rgba(201,162,39,.07) !important;border-left:3px solid rgba(201,162,39,.5);padding-left:9px}
.crow.not-announced:hover{background:rgba(201,162,39,.12) !important;margin:0 -1.5rem;padding-left:calc(1.5rem + 9px);padding-right:1.5rem}
.crow-da-pending{font-size:10px;color:#b07800;font-weight:600;margin-top:2px}

/* ── STATUT VENTES ────────────────────────────────────── */
.ventes-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.ventes-badge:hover{opacity:.8}
.ventes-0{background:#f5f5f3;color:#aaa;border-color:#e5e5e5}
.ventes-1{background:#fff0f0;color:#c0392b;border-color:#f5c6c2}
.ventes-2{background:#fff8ec;color:#a06010;border-color:#f0d090}
.ventes-3{background:#eef7f2;color:#2d7a4f;border-color:#b8e0ca}
.ventes-4{background:#1a7a4f;color:#fff;border-color:#155c3a}
.ventes-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ventes-0 .ventes-dot{background:#ccc}
.ventes-1 .ventes-dot{background:#e24b4a}
.ventes-2 .ventes-dot{background:#c47c00}
.ventes-3 .ventes-dot{background:#2d7a4f}
.ventes-4 .ventes-dot{background:rgba(255,255,255,.7)}

/* ── GESTIONNAIRE DE TACHES ──────────────────────────── */
.tk-board{display:flex;gap:16px;align-items:flex-start;overflow-x:auto;padding-bottom:1rem}
.tk-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:240px;width:240px;flex-shrink:0;box-shadow:var(--shadow)}
.tk-col-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tk-col-name-input{font-size:12px;font-weight:600;flex:1;outline:none;border:none;background:transparent;cursor:pointer;padding:0}
.tk-col-name-input:focus{background:var(--bg);border-radius:4px;padding:2px 4px}
.tk-col-count{font-size:10px;color:var(--text-3);background:var(--bg);border-radius:20px;padding:1px 7px}
.tk-col-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:14px;padding:2px 4px;border-radius:4px}
.tk-col-del:hover{color:var(--red);background:var(--red-bg)}
.tk-tasks{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:40px}
.tk-task{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;cursor:default;transition:box-shadow .15s}
.tk-task:hover{box-shadow:var(--shadow-md)}
.tk-task.done{opacity:.45}
.tk-task.done .tk-task-name{text-decoration:line-through}
.tk-task-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.4}
.tk-task-date{font-size:10px;margin-top:4px;font-weight:500}
.tk-task-date.late{color:var(--red)}
.tk-task-date.today{color:#b07800}
.tk-task-date.soon{color:var(--text-2)}
.tk-task-date.future{color:var(--text-3)}
.tk-task-prio{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;margin-top:4px}
.tk-prio-high{background:#fff0f0;color:#c0392b;border:1px solid #f5c6c2}
.tk-prio-normal{background:#f0f0ee;color:#888;border:1px solid #e5e5e5}
.tk-prio-low{background:#eef7f2;color:#2d7a4f;border:1px solid #b8e0ca}
.tk-task-actions{display:flex;gap:4px;margin-top:6px}
.tk-task-btn{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-3);transition:all .15s}
.tk-task-btn:hover{background:var(--bg);color:var(--text)}
.tk-task-btn.done-btn:hover{color:var(--green)}
.tk-task-btn.del-btn:hover{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}
.tk-add-task-btn{width:calc(100% - 16px);margin:0 8px 8px;padding:6px 8px;font-size:11px;color:var(--text-3);background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:left;transition:all .15s}
.tk-add-task-btn:hover{background:var(--bg);color:var(--text);border-color:#aaa}
.tk-add-col-btn{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);min-width:200px;padding:12px;cursor:pointer;color:var(--text-3);font-size:12px;text-align:center;transition:all .15s;align-self:flex-start}
.tk-add-col-btn:hover{background:var(--bg);color:var(--text);border-color:#aaa}
.tk-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.tk-modal.open{display:flex}
.tk-modal-box{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:400px;max-width:90vw;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:12px}
.tk-modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.tk-modal label{font-size:12px;color:var(--text-2);font-weight:500;display:block;margin-bottom:4px}
.tk-modal input,.tk-modal select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);outline:none}
.tk-modal input:focus,.tk-modal select:focus{border-color:#888}
.tk-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* ── WIDGET DASHBOARD ────────────────────────────────── */
.dash-top{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:2rem}
.dash-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.dash-widget-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dash-widget-title{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em;flex:1;display:flex;align-items:center;gap:6px}
.dash-widget-link{font-size:10px;color:var(--text-3);cursor:pointer;padding:2px 6px;border-radius:4px;border:none;background:none;transition:all .15s}
.dash-widget-link:hover{background:var(--bg);color:var(--text)}
/* Annonces compactes 3 colonnes */
.ann-grid-compact{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.ann-card-compact{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;cursor:pointer;transition:box-shadow .15s}
.ann-card-compact:hover{box-shadow:var(--shadow-md)}
.ann-card-compact.ann-late{border-color:var(--red-border);background:var(--red-bg)}
.ann-card-compact.ann-nodate{border:1px dashed #ddd}
.ann-compact-day{font-size:20px;font-weight:800;line-height:1;color:var(--text);letter-spacing:-.02em}
.ann-late .ann-compact-day{color:var(--red)}
.ann-nodate .ann-compact-day{color:var(--text-3);font-size:16px}
.ann-compact-month{font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-left:2px}
.ann-late .ann-compact-month{color:var(--red)}
.ann-compact-art{font-size:11px;font-weight:600;color:var(--text);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ann-compact-status{font-size:9px;color:var(--text-3);margin-top:1px}
.ann-card-compact.ann-today{border-color:rgba(201,162,39,.6);background:rgba(201,162,39,.08);animation:glow 2s ease-in-out infinite}
.ann-card-compact.ann-today .ann-compact-day{color:#b07800}
.ann-card-compact.ann-today .ann-compact-month{color:#b07800}
.ann-card-compact.ann-today .ann-compact-art{color:var(--text)}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,0)}50%{box-shadow:0 0 8px 2px rgba(201,162,39,.3)}}
.ann-late .ann-compact-status{color:var(--red);font-weight:600}
/* Widget tâches : 4 colonnes */
.tk-widget-board{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:0}
.tk-widget-col{border-right:1px solid var(--border-light);padding:8px}
.tk-widget-col:last-child{border-right:none}
.tk-widget-col-title{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border-light)}
.tk-widget-col-title.late{color:var(--red)}
.tk-widget-col-title.today{color:#b07800}
.tk-widget-task{display:flex;align-items:flex-start;gap:6px;padding:4px 2px;border-radius:4px;cursor:pointer;transition:background .1s}
.tk-widget-task:hover{background:var(--bg)}
.tk-widget-task.done{opacity:.4}
.tk-widget-chk{width:11px;height:11px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer}
.tk-widget-chk.on{background:var(--text);border-color:var(--text)}
.tk-widget-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tk-widget-dot.high{background:#e24b4a}
.tk-widget-dot.normal{background:#ccc}
.tk-widget-dot.low{background:#2d7a4f}
.tk-widget-task-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.3;flex:1}
.tk-widget-task.done .tk-widget-task-name{text-decoration:line-through}
.tk-widget-empty-col{font-size:10px;color:#ddd;font-style:italic;padding:2px}
.tk-widget-add-btn{margin:8px;width:calc(100% - 16px);padding:5px 8px;font-size:10px;color:var(--text-3);background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:left;transition:all .15s}
.tk-widget-add-btn:hover{background:var(--bg);color:var(--text);border-color:#aaa}

/* ── SECTION REPLIABLE ───────────────────────────────── */
.fiche-section-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:4px 0}
.fiche-section-toggle:hover .fiche-section-title{color:var(--text-2)}

/* ── TACHES DELEGUES ─────────────────────────────────── */
.tk-task.delegue{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.3)}
.tk-task.delegue .tk-task-name{color:#2563eb}
.tk-widget-task.delegue .tk-widget-task-name{color:#2563eb}
.tk-widget-task.delegue{background:rgba(59,130,246,.06);border-radius:4px}
.tk-delegue-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3b82f6;margin-left:4px;vertical-align:middle;flex-shrink:0}
.ftask.delegue .ftask-name{color:#2563eb}
.ftask.delegue{background:rgba(59,130,246,.05);border-left:3px solid rgba(59,130,246,.5)}
</style>

async function dbGet(key,fallback){
  var r=await fetch(SUPABASE_URL+'/rest/v1/app_data?key=eq.'+key+'&select=value',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});

  if(!rows||!rows.length)return fallback;
  try{return JSON.parse(rows[0].value);}catch(e){return fallback;}
}
async function dbSet(key,value){
  await fetch(SUPABASE_URL+'/rest/v1/app_data',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key:key,value:JSON.stringify(value)})});
}

  saveTimer=setTimeout(async function(){await Promise.all([dbSet('concerts',concerts),dbSet('taskstates',taskStates),dbSet('process',process),dbSet('tkcols',tkCols),dbSet('tktasks',tkTasks)]);el.classList.remove('show');},800);
}

    var raw=res[2]||DEFAULT_PROCESS;
    process=raw.map(function(t){return Object.assign({prereq:null,cat:t.cat||'gen'},t);});
    concerts=concerts.map(function(c){return Object.assign({medias:'',jeux:'',budget:'',notes:'',ventes:0},c);});
    nextId=process.length?Math.max.apply(null,process.map(function(t){return t.id;}))+1:26;
  }catch(e){concerts=[];taskStates={};process=DEFAULT_PROCESS;}
  var tkRes=await Promise.all([dbGet('tkcols',[]),dbGet('tktasks',[])]);
  tkCols=tkRes[0]||[];tkTasks=tkRes[1]||[];
  // Assurer les 4 colonnes projets avec leurs noms corrects
  var projDefs=[{id:'pp',nom:'Please Please'},{id:'gc',nom:'Golden Coast'},{id:'antdt',nom:'ANTDT'},{id:'sr',nom:'Saline Royale'}];
  if(!tkCols.length){
    tkCols=projDefs.slice();
  } else {
    // Mettre à jour les noms si les colonnes existent déjà avec de vieux noms
    projDefs.forEach(function(p){
      var existing=tkCols.find(function(c){return c.id===p.id;});
      if(existing&&(existing.nom==='A faire'||existing.nom==='En cours'||existing.nom==='Termine'||existing.nom==='Nouvelle colonne')){
        existing.nom=p.nom;
      }
      if(!existing){tkCols.push(p);}
    });
  }
  render();
}

function calcDate(c,t){var base=t.ref==='annonce'?c.da:c.dc;if(!base)return null;var d=new Date(base);d.setDate(d.getDate()+t.jours);return d;}
function formatLieu(ville){
  if(!ville)return '';
  var parts=ville.split(' - ');
  if(parts.length<2)return ville;
  var salles=['arena','zenith','vapeur','cube','cedre','c\xe8dre','spot','expo','parc','le k','la vapeur','tinqueux','k tinqueux'];
  var first=parts[0].toLowerCase().trim();
  var isOldFormat=salles.some(function(s){return first.indexOf(s)>=0;});
  if(isOldFormat){
    // Ancien format "Salle - Ville" → afficher "Ville - Salle"
    return parts[parts.length-1].trim()+' - '+parts.slice(0,-1).join(' - ').trim();
  }
  // Nouveau format "Ville - Salle" → afficher tel quel
  return parts[0].trim()+' - '+parts.slice(1).join(' - ').trim();
}
function getVille(ville){
  if(!ville)return '';
  var parts=ville.split(' - ');
  if(parts.length<2)return ville.trim();
  // Detecter si c'est l'ancien format "Salle - Ville"
  var salles=['arena','zenith','vapeur','cube','cedre','cèdre','spot','expo','parc','le k','tinqueux','k tinqueux'];
  var first=parts[0].toLowerCase().trim();
  var isOldFormat=salles.some(function(s){return first.indexOf(s)>=0;});
  var v=isOldFormat?parts[parts.length-1].trim():parts[0].trim();
  var aliases={'Chenove':'Dijon','Chenôve':'Dijon'};
  return aliases[v]||v;
}
function fmt(d){return d?d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'-';}
function isLate(d){if(!d)return false;var n=new Date();n.setHours(0,0,0,0);return d<n;}
function isToday(d){if(!d)return false;var n=new Date();n.setHours(0,0,0,0);var e=new Date(n);e.setDate(e.getDate()+1);return d>=n&&d<e;}
function isSoon(d){if(!d)return false;var n=new Date();n.setHours(0,0,0,0);var s=new Date(n);s.setDate(s.getDate()+7);return d>=n&&d<=s;}
function tk(cid,tid){return cid+'-'+tid;}
function isUnlocked(c,t){if(!t.prereq)return true;return !!taskStates[tk(c.id,t.prereq)];}
function sortedProcess(c){return process.slice().sort(function(a,b){var da=calcDate(c,a),db=calcDate(c,b);if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;return da-db;});}
function filtered(){
  var s=(document.getElementById('search')||{value:''}).value.toLowerCase();
  var v=(document.getElementById('fville')||{value:''}).value;
  var p=(document.getElementById('fperiode')||{value:''}).value;
  var cat=(document.getElementById('fcat')||{value:''}).value;
  return concerts.filter(function(c){
    if(s&&c.art.toLowerCase().indexOf(s)<0)return false;
    if(v&&getVille(c.ville)!==v)return false;
    if(p&&(c.dc||'').indexOf(p)<0)return false;
    if(cat){
      var sorted=sortedProcess(c);
      var hascat=sorted.some(function(t){
        var d=calcDate(c,t);
        return t.cat===cat&&!taskStates[tk(c.id,t.id)]&&isUnlocked(c,t)&&(isLate(d)||isToday(d));
      });
      if(!hascat)return false;
    }
    return true;
  });
}
function updateFilters(){

  var fv=document.getElementById('fville'),fp=document.getElementById('fperiode'),fc=document.getElementById('fcat');

  fp.innerHTML='<option value="">Toutes les periodes</option>';

  if(fc){

function renderFicheTasks(c){
  var sorted=sortedProcess(c);
  var el=document.getElementById('fiche-tasks');
  var late=sorted.filter(function(t){return !taskStates[tk(c.id,t.id)]&&isUnlocked(c,t)&&isLate(calcDate(c,t));});
  var soon=sorted.filter(function(t){return !taskStates[tk(c.id,t.id)]&&isUnlocked(c,t)&&isSoon(calcDate(c,t));});
  var future=sorted.filter(function(t){return !taskStates[tk(c.id,t.id)]&&isUnlocked(c,t)&&calcDate(c,t)&&!isLate(calcDate(c,t))&&!isSoon(calcDate(c,t));});
  var nocalc=sorted.filter(function(t){return !taskStates[tk(c.id,t.id)]&&isUnlocked(c,t)&&!calcDate(c,t);});
  var blocked=sorted.filter(function(t){return !taskStates[tk(c.id,t.id)]&&!isUnlocked(c,t);});
  var done=sorted.filter(function(t){return taskStates[tk(c.id,t.id)];});
  function taskHtml(t,isBlocked){
    var d=calcDate(c,t);var isDone=!!taskStates[tk(c.id,t.id)];
    var cat=CATS[t.cat]||{cls:'p-gen',label:'?'};
    var dateStr='',dateClass='',badge='';
    if(isBlocked){var pt=process.find(function(p){return p.id===t.prereq;});dateStr='En attente de : '+(pt?pt.nom:'?');dateClass='blocked';badge='<span class="status-badge badge-blocked">En attente</span>';}
    else if(isDone){dateStr='Fait';dateClass='done-date';badge='<span class="status-badge badge-done">Fait</span>';}
    else if(!d){dateStr='Date manquante';dateClass='future';}
    else if(isLate(d)){dateStr='En retard - '+fmt(d);dateClass='late';badge='<span class="status-badge badge-late">En retard</span>';}
    else if(isSoon(d)){dateStr='Bientot - '+fmt(d);dateClass='soon';badge='<span class="status-badge badge-soon">Cette semaine</span>';}
    else{dateStr=fmt(d);dateClass='future';}
    var clickable=!isBlocked;
    return '<div class="ftask'+(isDone?' done':isBlocked?' blocked':'')+'"'+(clickable?' onclick="toggleFicheTask(\''+c.id+'\','+t.id+')"':'')+'>'+
      '<div class="ftask-chk'+(isDone?' on':isBlocked?' blocked':'')+'">'+( isDone?'&#10003;':isBlocked?'&#8987;':'')+' </div>'+
      '<div style="flex:1"><div class="ftask-name">'+t.nom+'</div>'+
      '<div style="display:flex;align-items:center;gap:6px;margin-top:3px">'+
      '<span class="pill '+cat.cls+'">'+cat.label+'</span>'+
      '<span class="ftask-date '+dateClass+'">'+dateStr+'</span></div></div>'+badge+'</div>';
  }
  var html='';
  if(late.length)html+='<div class="group-title" style="color:var(--red)">En retard ('+late.length+')</div>'+late.map(function(t){return taskHtml(t,false);}).join('');
  if(soon.length)html+='<div class="group-title'+(late.length?' second':'')+'" style="color:var(--amber)">Cette semaine ('+soon.length+')</div>'+soon.map(function(t){return taskHtml(t,false);}).join('');
  if(future.length)html+='<div class="group-title second">A venir ('+future.length+')</div>'+future.map(function(t){return taskHtml(t,false);}).join('');
  if(nocalc.length)html+='<div class="group-title second">Sans date calculee ('+nocalc.length+')</div>'+nocalc.map(function(t){return taskHtml(t,false);}).join('');
  if(blocked.length)html+='<div class="group-title second" style="color:var(--text-3)">En attente de prerequis ('+blocked.length+')</div>'+blocked.map(function(t){return taskHtml(t,true);}).join('');
  if(done.length)html+='<div class="group-title second" style="color:var(--green)">Terminees ('+done.length+')</div>'+done.map(function(t){return taskHtml(t,false);}).join('');
  if(!html)html='<div style="color:var(--text-3);font-size:13px;padding:1rem 0">Aucune tache.</div>';
  el.innerHTML=html;
}

function renderAnnonces(){

  }).sort(function(a,b){

    var monTxt=hasDate?da.toLocaleDateString('fr-FR',{month:'short'}).toUpperCase():'--';
    var statusTxt=!hasDate?'Sans date':isLateA?'Retard':isToday2?"Auj.":diffDays===1?'Demain':'J-'+diffDays;
    return '<div class="'+cls+'" onclick="openFiche(\''+c.id+'\')" title="'+c.art+'">'

  wrap.innerHTML='<div class="ann-grid-compact">'+cards+'</div>';

      var notesHtml=notes
        ?'<div style="line-height:1.5;font-size:11px;color:var(--text-2)">'+notes+'</div>'
        :'<div class="crow-cell-empty">—</div>';
      var budHtml=bud
        ?'<a href="'+bud+'" target="_blank" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);text-decoration:none;white-space:nowrap;transition:all .15s" onmouseover="this.style.background=\'var(--bg)\';this.style.color=\'var(--text)\'" onmouseout="this.style.background=\'var(--surface)\';this.style.color=\'var(--text-2)\'">Ouvrir &#8599;</a>'
        :'<div class="crow-cell-empty">Ajouter un lien...</div>';

      var daStr='';
      if(daDate){
        var daFmt=daDate.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
        daStr=notAnnounced
          ?'<div class="crow-da-pending" style="margin-top:3px">&#9679; Annonce : '+daFmt+'</div>'
          :'<div style="font-size:10px;color:var(--text-3);margin-top:3px">Annonce : '+daFmt+'</div>';
      }

      var infoBloc='<div style="width:220px;flex-shrink:0;padding:12px 16px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border-light)">'
        +'<div class="crow-name">'+c.art+'</div>'
        +'<div style="font-size:11px;font-weight:500;color:var(--text-2);margin-top:2px">'+(c.ville?formatLieu(c.ville)+' - ':'')+ds+'</div>'
        +daStr+'</div>';

      var cellStyle='flex:1;padding:8px 12px;border-left:1px solid var(--border-light);display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:background .15s';
      var cM='<div style="'+cellStyle+'" onclick="startCellEdit(event,\''+c.id+'\',\'medias\')" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">'
        +'<div class="crow-cell-label">Medias</div><div>'+medHtml+'</div></div>';
      var cJ='<div style="'+cellStyle+'" onclick="startCellEdit(event,\''+c.id+'\',\'jeux\')" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">'
        +'<div class="crow-cell-label">Jeu concours</div><div>'+jxHtml+'</div></div>';
      var cN='<div style="'+cellStyle+'" onclick="startCellEdit(event,\''+c.id+'\',\'notes\')" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">'
        +'<div class="crow-cell-label">Notes</div><div>'+notesHtml+'</div></div>';
      var cB='<div style="width:140px;flex-shrink:0;padding:8px 12px;border-left:1px solid var(--border-light);display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:background .15s" onclick="startCellEdit(event,\''+c.id+'\',\'budget\')" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">'
        +'<div class="crow-cell-label">Budget</div><div style="margin-top:4px">'+budHtml+'</div></div>';

      var statutBloc='<div style="width:120px;flex-shrink:0;padding:8px 12px;border-left:1px solid var(--border-light);display:flex;flex-direction:column;gap:6px;justify-content:center">'
        +ventesHtml(c,'toggleVentes(event,\''+c.id+'\')')
        +(isAnnounced?'<button class="ann-undo" onclick="event.stopPropagation();annonceUndo(\''+c.id+'\')" style="font-size:11px;color:var(--text-3);text-align:left;background:none;border:none;cursor:pointer">&#8635; Annonce</button>':'')
        +'</div>';

      return '<div class="crow'+(notAnnounced?' not-announced':'')+'" onclick="openFiche(\''+c.id+'\')" style="display:flex;align-items:stretch;padding:0;min-height:52px;"+((c.ventes||0)===4?"background:rgba(26,122,79,.06)":"")+">'
        +infoBloc+cM+cJ+cN+cB+statutBloc
        +'<span style="font-size:12px;color:#ccc;padding:0 8px;display:flex;align-items:center">&#8250;</span></div>';
    }).join('')+'</div>';
}
function renderProcess(){
  var annonce=process.filter(function(t){return t.ref==='annonce';}).sort(function(a,b){return a.jours-b.jours;});
  var concert=process.filter(function(t){return t.ref==='concert';}).sort(function(a,b){return a.jours-b.jours;});
  function catSelect(t){
    var opts='';
    Object.keys(CATS).forEach(function(k){opts+='<option value="'+k+'"'+(t.cat===k?' selected':'')+'>'+CATS[k].label+'</option>';});
    return '<select onchange="updTask('+t.id+',\'cat\',this.value)">'+opts+'</select>';
  }
  function prereqSelect(t){
    var opts='<option value="">Aucun</option>';
    process.filter(function(p){return p.id!==t.id;}).forEach(function(p){opts+='<option value="'+p.id+'"'+(t.prereq===p.id?' selected':'')+'>'+p.nom+'</option>';});
    return '<select onchange="updTask('+t.id+',\'prereq\',this.value)">'+opts+'</select>';
  }
  function renderGroup(tasks,title,second){
    return '<div class="group-title'+(second?' second':'')+'">'+title+'</div>'+
      tasks.map(function(t){
        return '<div class="prow" draggable="true" data-id="'+t.id+'"'+
          ' ondragstart="dragStart(event,'+t.id+')" ondragover="dragOver(event)"'+
          ' ondrop="dragDrop(event,'+t.id+')" ondragleave="dragLeave(event)">'+
          '<span class="drag">&#8942;</span>'+
          '<input type="text" value="'+t.nom+'" onchange="updTask('+t.id+',\'nom\',this.value)">'+
          '<input type="number" value="'+t.jours+'" onchange="updTask('+t.id+',\'jours\',this.value)">'+
          '<select onchange="updTask('+t.id+',\'ref\',this.value)">'+
          '<option value="concert"'+(t.ref==='concert'?' selected':'')+'>J avant concert</option>'+
          '<option value="annonce"'+(t.ref==='annonce'?' selected':'')+'>J apres annonce</option>'+
          '</select>'+
          catSelect(t)+prereqSelect(t)+
          '<button class="dbtn" onclick="delTask('+t.id+')">x</button></div>';
      }).join('');
  }
  document.getElementById('plist').innerHTML=
    renderGroup(annonce,'Taches liees a la date d\'annonce',false)+
    renderGroup(concert,'Taches liees a la date de concert',true);
}
function dragStart(e,id){dragSrcId=id;}
function dragOver(e){e.preventDefault();}
function dragLeave(e){}
function dragDrop(e,targetId){
  e.preventDefault();if(dragSrcId===targetId)return;
  var src=process.findIndex(function(p){return p.id===dragSrcId;});
  var tgt=process.findIndex(function(p){return p.id===targetId;});
  var item=process.splice(src,1)[0];process.splice(tgt,0,item);
  scheduleSave();renderProcess();
}
function toggleVentes(e,cid){
  e.stopPropagation();
  var c=concerts.find(function(x){return x.id===cid;});
  if(!c)return;
  c.ventes=((c.ventes||0)+1)%VENTES.length;
  scheduleSave();renderConcerts();renderKanban();
}
function ventesHtml(c,onclick){
  var v=VENTES[c.ventes||0];
  return '<span class="ventes-badge '+v.cls+'" onclick="'+onclick+'">'
    +'<span class="ventes-dot"></span>'+v.label+'</span>';
}
function toggleFicheInfo(){
  var icon=document.getElementById('fiche-toggle-icon');
  var box=document.getElementById('fiche-info-collapsible');
  if(!icon||!box)return;
  var open=box.style.maxHeight&&box.style.maxHeight!=='0px';
  if(open){box.style.maxHeight='0';box.style.opacity='0';icon.style.transform='';}
  else{box.style.maxHeight='800px';box.style.opacity='1';icon.style.transform='rotate(90deg)';}
}
function toggleHighlight(cid,tid){var k="hl-"+cid+"-"+tid;if(taskStates[k])delete taskStates[k];else taskStates[k]=true;scheduleSave();renderKanban();renderTkWidget();}
function startCellEdit(e,cid,field){
  e.stopPropagation();
  var cell=e.currentTarget;
  var c=concerts.find(function(x){return x.id===cid;});
  if(!c)return;
  var cur=c[field]||'';
  var labels={medias:'Media / Photo',jeux:'Jeu concours',notes:'Notes',budget:'Budget'};
  var placeholders={medias:'Bien Public, L union...',jeux:'L union 5x2...',notes:'Notes libres...',budget:'https://...'};
  cell.classList.add('editing');
  var inp=document.createElement('input');
  inp.type='text';
  inp.value=cur;
  inp.placeholder=placeholders[field]||'';
  inp.style.cssText='width:100%;border:none;outline:none;background:transparent;font-size:11px;color:#111;font-family:inherit;padding:0';
  cell.innerHTML='<div class="crow-cell-label">'+labels[field]+'</div>';
  cell.appendChild(inp);
  inp.focus();inp.select();
  function save(){c[field]=inp.value.trim();scheduleSave();renderConcerts();}
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(ev){
    if(ev.key==='Enter')inp.blur();
    if(ev.key==='Escape'){c[field]=cur;renderConcerts();}
  });
}
function toggleNewConcert(){
  var form=document.getElementById('new-concert-form');
  var btn=document.getElementById('btn-new-concert');
  if(form.style.display==='none'){
    form.style.display='block';
    btn.textContent='Annuler';
    btn.classList.remove('btn-primary');
  } else {
    form.style.display='none';
    btn.textContent='+ Nouveau concert';
    btn.classList.add('btn-primary');
  }
}

// ── GESTIONNAIRE DE TACHES MANUEL ────────────────────────
function tkNewId(){return 'tk'+Date.now()+Math.floor(Math.random()*1000);}
function tkFmtDate(d){
  if(!d)return null;
  var dt=new Date(d);dt.setHours(0,0,0,0);
  var n=new Date();n.setHours(0,0,0,0);
  var diff=Math.round((dt-n)/(1000*60*60*24));
  var fmt=dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  if(diff<0)return {cls:'late',txt:'En retard - '+fmt};
  if(diff===0)return {cls:'today',txt:"Aujourd'hui"};
  if(diff<=7)return {cls:'soon',txt:fmt};
  return {cls:'future',txt:fmt};
}
function tkPrioLabel(p){
  if(p==='high')return {cls:'tk-prio-high',txt:'Haute'};
  if(p==='low')return {cls:'tk-prio-low',txt:'Basse'};
  return {cls:'tk-prio-normal',txt:'Normale'};
}
function renderTaches(){
  var wrap=document.getElementById('taches-board-wrap');
  if(!wrap)return;
  // Construire le board
  var board=document.createElement('div');
  board.className='tk-board';
  tkCols.forEach(function(col){
    var colTasks=tkTasks.filter(function(t){return t.colId===col.id&&!t.done;}).sort(function(a,b){
      if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;
      return new Date(a.date)-new Date(b.date);
    });
    var doneTasks=tkTasks.filter(function(t){return t.colId===col.id&&t.done;}).sort(function(a,b){
      return new Date(a.date||0)-new Date(b.date||0);
    });
    var allTasks=colTasks.concat(doneTasks);
    // Colonne
    var colEl=document.createElement('div');colEl.className='tk-col';
    colEl.draggable=true;colEl.dataset.colid=col.id;
    colEl.addEventListener('dragstart',function(e){e.dataTransfer.setData('colid',col.id);colEl.style.opacity='.5';});
    colEl.addEventListener('dragend',function(){colEl.style.opacity='1';});
    colEl.addEventListener('dragover',function(e){e.preventDefault();colEl.style.background='var(--bg)';});
    colEl.addEventListener('dragleave',function(){colEl.style.background='';});
    colEl.addEventListener('drop',function(e){
      e.preventDefault();colEl.style.background='';
      var fromId=e.dataTransfer.getData('colid');
      if(fromId===col.id)return;
      var fromIdx=tkCols.findIndex(function(c){return c.id===fromId;});
      var toIdx=tkCols.findIndex(function(c){return c.id===col.id;});
      if(fromIdx<0||toIdx<0)return;
      var item=tkCols.splice(fromIdx,1)[0];tkCols.splice(toIdx,0,item);
      scheduleSave();renderTaches();renderTkWidget();
    });
    // Header
    var head=document.createElement('div');head.className='tk-col-head';
    var projNames={pp:'Please Please',gc:'Golden Coast',antdt:'ANTDT',sr:'Saline Royale'};
    var displayNom=projNames[col.id]||col.nom;
    var inp=document.createElement('input');
    inp.className='tk-col-name-input';inp.value=displayNom;inp.type='text';
    inp.addEventListener('blur',function(){tkRenameCol(col.id,inp.value);});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});
    var cnt=document.createElement('span');cnt.className='tk-col-count';cnt.textContent=allTasks.length;
    
    colEl.appendChild(head);
    // Tâches
    var tasksEl=document.createElement('div');tasksEl.className='tk-tasks';
    allTasks.forEach(function(t){
      var df=t.date?tkFmtDate(t.date):null;
      var pl=tkPrioLabel(t.prio||'normal');
      var taskEl=document.createElement('div');taskEl.className='tk-task'+(t.done?' done':'')+(t.delegue?' delegue':'');
      var nameEl=document.createElement('div');nameEl.className='tk-task-name';nameEl.textContent=t.nom;
      taskEl.appendChild(nameEl);
      if(df){var dateEl=document.createElement('div');dateEl.className='tk-task-date '+df.cls;dateEl.textContent=df.txt;taskEl.appendChild(dateEl);}
      var prioEl=document.createElement('span');prioEl.className='tk-task-prio '+pl.cls;prioEl.textContent=pl.txt;taskEl.appendChild(prioEl);
      var actions=document.createElement('div');actions.className='tk-task-actions';
      var doneBtn=document.createElement('button');doneBtn.className='tk-task-btn done-btn';
      doneBtn.innerHTML=t.done?'&#8635; Rouvrir':'&#10003; Fait';
      doneBtn.addEventListener('click',function(){tkToggleDone(t.id);});
      var editBtn=document.createElement('button');editBtn.className='tk-task-btn';editBtn.innerHTML='&#9998; Modifier';
      editBtn.addEventListener('click',function(){tkEditTask(t.id);});
      var delBtn=document.createElement('button');delBtn.className='tk-task-btn del-btn';delBtn.innerHTML='&#x2715;';
      delBtn.addEventListener('click',function(){tkDelTask(t.id);});
      var delegBtn=document.createElement('button');
      delegBtn.className='tk-task-btn';
      delegBtn.style.color=t.delegue?'#2563eb':'';
      delegBtn.innerHTML=t.delegue?'&#9679; Delegue':'&#9675; Deleguer';
      delegBtn.addEventListener('click',function(){tkToggleDelegue(t.id);});
      actions.appendChild(doneBtn);actions.appendChild(editBtn);actions.appendChild(delBtn);actions.appendChild(delegBtn);
      taskEl.appendChild(actions);
      tasksEl.appendChild(taskEl);
    });
    colEl.appendChild(tasksEl);
    // Bouton ajouter tâche
    var addTaskBtn=document.createElement('button');addTaskBtn.className='tk-add-task-btn';addTaskBtn.textContent='+ Ajouter une tache';
    addTaskBtn.addEventListener('click',function(){tkOpenModal(col.id);});
    colEl.appendChild(addTaskBtn);
    board.appendChild(colEl);
  });
  
  wrap.innerHTML='';wrap.appendChild(board);
  // Setup modal buttons (une seule fois)
  tkSetupModal();
}
var tkModalSetup=false;
function tkSetupModal(){
  if(tkModalSetup)return;tkModalSetup=true;
  document.getElementById('tk-modal-save').addEventListener('click',tkSaveTask);
  document.getElementById('tk-modal-cancel').addEventListener('click',tkCloseModal);
  document.getElementById('tk-modal').addEventListener('click',function(e){if(e.target===this)tkCloseModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')tkCloseModal();});
}
function tkOpenModal(colId){
  tkEditId=null;tkAddColId=colId;
  document.getElementById('tk-modal-title').textContent='Nouvelle tache';
  document.getElementById('tk-nom').value='';
  document.getElementById('tk-date').value='';
  document.getElementById('tk-prio').value='normal';
  document.getElementById('tk-modal-save').textContent='Ajouter';
  document.getElementById('tk-modal').classList.add('open');
  setTimeout(function(){document.getElementById('tk-nom').focus();},50);
}
function tkEditTask(id){
  var t=tkTasks.find(function(x){return x.id===id;});if(!t)return;
  tkEditId=id;tkAddColId=null;
  document.getElementById('tk-modal-title').textContent='Modifier la tache';
  document.getElementById('tk-nom').value=t.nom;
  document.getElementById('tk-date').value=t.date||'';
  document.getElementById('tk-prio').value=t.prio||'normal';
  document.getElementById('tk-modal-save').textContent='Enregistrer';
  document.getElementById('tk-modal').classList.add('open');
  setTimeout(function(){document.getElementById('tk-nom').focus();},50);
}
function tkSaveTask(){
  var nom=document.getElementById('tk-nom').value.trim();
  var date=document.getElementById('tk-date').value;
  var prio=document.getElementById('tk-prio').value;
  if(!nom)return;
  if(tkEditId){
    var t=tkTasks.find(function(x){return x.id===tkEditId;});
    if(t){t.nom=nom;t.date=date;t.prio=prio;}
  } else {
    tkTasks.push({id:tkNewId(),colId:tkAddColId,nom:nom,date:date,prio:prio,done:false,delegue:false});
  }
  scheduleSave();tkCloseModal();renderTaches();renderTkWidget();
}
function tkCloseModal(){document.getElementById('tk-modal').classList.remove('open');}
function tkToggleDelegue(id){
  var t=tkTasks.find(function(x){return x.id===id;});
  if(!t)return;
  t.delegue=!t.delegue;
  scheduleSave();renderTaches();renderTkWidget();
}
function tkToggleDone(id){
  var t=tkTasks.find(function(x){return x.id===id;});
  if(t){t.done=!t.done;scheduleSave();renderTaches();renderTkWidget();}
}
function tkDelTask(id){
  tkTasks=tkTasks.filter(function(x){return x.id!==id;});
  scheduleSave();renderTaches();renderTkWidget();
}
function tkAddCol(){}
function tkRenameCol(id,nom){
  var col=tkCols.find(function(x){return x.id===id;});
  if(col&&nom.trim()){col.nom=nom.trim();scheduleSave();}
}
function tkDelCol(id){}

function renderTkWidget(){
  var wrap=document.getElementById('tk-widget-wrap');
  if(!wrap)return;
  var today=new Date();today.setHours(0,0,0,0);

  // IDs et noms de référence des 4 projets
  var projDefs={
    pp:{id:'pp',nom:'Please Please'},
    gc:{id:'gc',nom:'Golden Coast'},
    antdt:{id:'antdt',nom:'ANTDT'},
    sr:{id:'sr',nom:'Saline Royale'}
  };
  var projIds=['pp','gc','antdt','sr'];

  // Respecter l'ordre de tkCols (comme dans l'onglet Tâches)
  // On prend les colonnes de tkCols qui correspondent aux 4 projets, dans leur ordre
  var orderedCols=tkCols.filter(function(c){return projIds.indexOf(c.id)>=0;});
  // Ajouter celles qui manquent encore
  projIds.forEach(function(pid){
    if(!orderedCols.find(function(c){return c.id===pid;})){
      orderedCols.push(projDefs[pid]);
    }
  });

  // Tâches épinglées concerts (dans PP)
  var pinnedConcertTasks=[];
  concerts.forEach(function(c){
    process.forEach(function(t){
      var hlKey='hl-'+c.id+'-'+t.id;
      if(taskStates[hlKey]&&!taskStates[c.id+'-'+t.id]){
        pinnedConcertTasks.push({
          id:'hl-'+c.id+'-'+t.id,
          colId:'pp',
          nom:c.art+' - '+t.nom,
          prio:'high',
          done:false,
          isPinned:true,
          concertId:c.id,
          taskId:t.id
        });
      }
    });
  });

  var board=document.createElement('div');
  board.className='tk-widget-board';

  orderedCols.forEach(function(col){
    var colId=col.id;

    // Tâches urgentes : retard + aujourd'hui + sans date
    var manualUrgent=tkTasks.filter(function(t){
      if(t.colId!==colId||t.done)return false;
      if(!t.date)return true;
      var d=new Date(t.date);d.setHours(0,0,0,0);
      return d<=today;
    }).sort(function(a,b){
      if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;
      return new Date(a.date)-new Date(b.date);
    });

    // Épinglées seulement dans PP
    var pinned=colId==='pp'?pinnedConcertTasks:[];
    var allTasks=pinned.concat(manualUrgent);

    var colEl=document.createElement('div');colEl.className='tk-widget-col';

    var title=document.createElement('div');title.className='tk-widget-col-title';
    title.textContent=col.nom+(allTasks.length?' ('+allTasks.length+')':'');
    colEl.appendChild(title);

    if(!allTasks.length){
      var emp=document.createElement('div');emp.className='tk-widget-empty-col';emp.textContent='—';colEl.appendChild(emp);
    } else {
      allTasks.forEach(function(t){
        var row=document.createElement('div');row.className='tk-widget-task'+(t.delegue?' delegue':'');
        var chk=document.createElement('div');chk.className='tk-widget-chk';
        if(t.isPinned){
          chk.addEventListener('click',function(e){
            e.stopPropagation();
            toggleTask(t.concertId,t.taskId);
            toggleHighlight(t.concertId,t.taskId);
          });
        } else {
          chk.addEventListener('click',function(e){e.stopPropagation();tkToggleDone(t.id);});
        }
        var dot=document.createElement('div');dot.className='tk-widget-dot '+(t.prio||'normal');
        var name=document.createElement('div');name.className='tk-widget-task-name';
        name.textContent=t.nom;name.title=t.nom;
        if(t.isPinned){name.style.fontStyle='italic';name.style.fontSize='10px';}
        row.appendChild(chk);row.appendChild(dot);row.appendChild(name);
        if(!t.isPinned){row.addEventListener('click',function(){tkEditTask(t.id);});}
        colEl.appendChild(row);
      });
    }

    var addBtn=document.createElement('button');addBtn.className='tk-widget-add-btn';addBtn.textContent='+';
    addBtn.title='Ajouter une tache dans '+col.nom;
    addBtn.addEventListener('click',function(e){
      e.stopPropagation();
      if(!tkCols.find(function(c){return c.id===colId;})){
        tkCols.push({id:colId,nom:col.nom});
      }
      tkOpenModal(colId);
    });
    colEl.appendChild(addBtn);
    board.appendChild(colEl);
  });

  wrap.innerHTML='';wrap.appendChild(board);
}
function render(){renderKanban();renderConcerts();renderProcess();renderTaches();renderTkWidget();}
init();
</script>
